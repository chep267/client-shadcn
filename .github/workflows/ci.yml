name: CI

on:
    push:
        branches: [main, develop]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: pnpm ci

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: npx tsc --noEmit

            - name: Build
              run: pnpm build
